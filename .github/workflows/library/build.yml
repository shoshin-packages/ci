# Переиспользуемый воркфлоу для сборки npm-библиотеки.
# Собирает dist/ и передаёт имя артефакта через output для использования в library/publish.yml.
# Подключение: uses: shoshin-packages/ci/.github/workflows/library/build.yml@main

name: Library Build

on:
  workflow_call:
    inputs:
      node-version:
        description: Версия Node.js
        type: string
        default: "22"
      build-script:
        description: npm-скрипт для сборки библиотеки (обычно Vite в lib-режиме)
        type: string
        default: library:build
    secrets:
      token:
        # Используется для чтения пакетов из GitHub Packages (@shoshin-packages).
        description: GitHub token для доступа к npm-реестру (передавать secrets.GITHUB_TOKEN)
        required: true
    outputs:
      artifact-name:
        # Передаётся в library/publish.yml через input build-artifact-name
        description: Имя загруженного артефакта сборки для передачи в publish-воркфлоу
        value: ${{ jobs.build-library.outputs.artifact-name }}

jobs:
  build-library:
    name: Build
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    outputs:
      # Пробрасываем имя артефакта из step в job output, затем в workflow output
      artifact-name: ${{ steps.set-output.outputs.artifact-name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Composite action: настраивает Node.js, git, .npmrc и запускает npm ci
      - name: Setup Node.js и npm registry
        uses: shoshin-packages/ci/.github/actions/npm-setup@main
        with:
          token: ${{ secrets.token }}
          node-version: ${{ inputs.node-version }}

      - name: Сборка библиотеки
        env:
          BUILD_SCRIPT: ${{ inputs.build-script }}
        run: npm run "$BUILD_SCRIPT"

      - name: Сохранение имени артефакта
        id: set-output
        # github.run_id гарантирует уникальность имени артефакта в рамках одного запуска
        run: echo "artifact-name=library-build-${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Загрузка артефакта сборки
        uses: actions/upload-artifact@v4
        with:
          name: library-build-${{ github.run_id }}
          path: dist/
          # retention-days: 1 — артефакт нужен только для передачи в publish, долго хранить не нужно
          retention-days: 1
